aid: moovit
name: Moovit
description: >-
  Moovit is a Tel Aviv-founded urban mobility company acquired by Intel in
  May 2020 for approximately $900M and now part of Mobileye's Mobility-as-a-
  Service (MaaS) business. The Moovit consumer app provides public transit
  trip planning, real-time arrivals, and service alerts to more than 1.5
  billion users across 3,500+ cities in 112+ countries, sourcing both
  official agency data and crowdsourced transit reports from its global
  community. Moovit's commercial offering is the Public Transit API suite —
  a thin, volume-metered HTTP API exposing six API families (Trip Plan,
  Nearby, Stops, Lines, Real-Time, Service Alerts) plus GTFS-Realtime feeds
  and a search API. The APIs power Microsoft (Azure Maps), Uber, Lyft,
  Cubic, and city/transit-agency MaaS deployments. Authentication is
  HMAC-SHA256 with a metro-scoped request header (USER_LOC or
  MOOVIT_METRO_ID). Pricing and rate limits are negotiated per customer;
  there is no self-service developer signup — credentials are issued by
  helpdesk@moovit.com.
